}

android {
    namespace 'com.saulozt.trivia.educational'
    compileSdk 36

    defaultConfig {
        applicationId 'com.saulozt.trivia.educational'
        minSdk 31
        targetSdk 36
        versionCode 2026001
        versionName '2026.0.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
